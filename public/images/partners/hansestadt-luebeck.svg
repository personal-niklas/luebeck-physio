<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Simplified Holstentor silhouette -->
  <g fill="#333">
    <!-- Left tower -->
    <rect x="6" y="18" width="10" height="32" rx="1"/>
    <rect x="4" y="14" width="14" height="6" rx="1"/>
    <polygon points="11,6 4,14 18,14"/>
    <!-- Gate arch -->
    <rect x="18" y="28" width="16" height="22" rx="1"/>
    <rect x="22" y="32" width="8" height="18" rx="4"/>
    <rect x="22" y="32" width="8" height="18" rx="4" fill="white"/>
    <!-- Right tower -->
    <rect x="36" y="18" width="10" height="32" rx="1"/>
    <rect x="34" y="14" width="14" height="6" rx="1"/>
    <polygon points="41,6 34,14 48,14"/>
  </g>
  <text x="58" y="38" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#333">Hansestadt Lübeck</text>
</svg>